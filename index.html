<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #fff7fb;
    color: #333;
    text-align: center;
}

/* HERO */
.hero {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
    url('https://images.unsplash.com/photo-1529634894893-1c5f0f1d6c4a') center/cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
}

.hero h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 70px;
    margin: 0;
}

.hero p {
    font-size: 18px;
}

/* SECTIONS */
.section {
    padding: 60px 20px;
}

/* COUNTDOWN */
.timer {
    font-size: 30px;
    font-weight: bold;
    color: #c2185b;
}

/* GALLERY */
.gallery img {
    width: 240px;
    height: 240px;
    object-fit: cover;
    margin: 10px;
    border-radius: 15px;
    transition: transform 0.3s;
}

.gallery img:hover {
    transform: scale(1.05);
}

/* RSVP */
.rsvp {
    background: #ffe6f0;
}

input, textarea {
    width: 80%;
    max-width: 400px;
    padding: 12px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    padding: 12px 25px;
    background: #c2185b;
    color: white;
    border: none;
    border-radius: 25px;
    cursor: pointer;
}

button:hover {
    background: #a3154a;
}

/* FADE IN */
.fade {
    animation: fadeIn 2s ease-in;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>
</head>

<body>

<!-- 🎵 MUSIC (replace link if needed) -->
<audio autoplay loop>
    <source src="" type="audio/mp3">
</audio>

<!-- HERO -->
<div class="hero fade">
    <h1>We're Getting Married</h1>
    <p>Save the Date 💍</p>
    <p><strong>26 December 2026</strong></p>
</div>

<!-- COUNTDOWN -->
<div class="section">
    <h2>Countdown to Our Big Day</h2>
    <div class="timer" id="timer"></div>
</div>

<!-- GALLERY -->
<div class="section gallery">
    <h2>Our Journey</h2>
    <img src="https://source.unsplash.com/400x400/?wedding,couple">
    <img src="https://source.unsplash.com/400x400/?love,ring">
    <img src="https://source.unsplash.com/400x400/?romance,flowers">
</div>

<!-- RSVP -->
<div class="section rsvp">
    <h2>RSVP</h2>
    <p>Let us know if you’re coming 💌</p>

    <input type="text" placeholder="Your Name"><br>
    <input type="email" placeholder="Your Email"><br>
    <textarea placeholder="Your Message"></textarea><br>

    <button onclick="alert('RSVP submitted! (Next step: connect Google Form for automation)')">
        Send RSVP
    </button>
</div>

<script>
// Countdown
const weddingDate = new Date("Dec 26, 2026 00:00:00").getTime();

setInterval(function () {
    const now = new Date().getTime();
    const distance = weddingDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("timer").innerHTML =
        days + "d " + hours + "h " + minutes + "m " + seconds + "s";

    if (distance < 0) {
        document.getElementById("timer").innerHTML = "It's Wedding Day 💍";
    }
}, 1000);
</script>

</body>
</html>
