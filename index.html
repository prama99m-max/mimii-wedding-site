<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wedding Invitation</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #fff6f0, #efe3d6);
    font-family: 'Georgia', serif;
}

/* ---------- FLOATING PETALS ---------- */
.petal {
    position: absolute;
    width: 12px;
    height: 12px;
    background: pink;
    opacity: 0.6;
    border-radius: 50%;
    animation: floatUp 8s linear infinite;
}

@keyframes floatUp {
    from { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    to { transform: translateY(-10vh) rotate(360deg); opacity: 1; }
}

/* ---------- ENVELOPE ---------- */
.container {
    text-align: center;
    z-index: 2;
}

.envelope {
    width: 320px;
    height: 200px;
    background: #fffdf9;
    border: 2px solid #d8c3a5;
    border-radius: 8px;
    position: relative;
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    overflow: hidden;
    transition: transform 1s ease;
}

/* flap */
.flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #f3e7d3;
    clip-path: polygon(0 0, 100% 0, 50% 55%);
    transform-origin: top;
    transition: transform 1.2s ease;
    z-index: 2;
}

/* wax seal */
.seal {
    width: 60px;
    height: 60px;
    background: #a8323a;
    border-radius: 50%;
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 3;
    cursor: pointer;
    box-shadow: 0 8px 18px rgba(0,0,0,0.25);
    transition: all 0.8s ease;
}

.seal::after {
    content: "✿";
    color: white;
    font-size: 22px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* crack effect */
.seal.crack {
    transform: translate(-50%, -50%) scale(1.1);
    background: #6d1f25;
    box-shadow: 0 0 20px rgba(255,0,0,0.4);
}

/* melt fade */
.seal.melt {
    opacity: 0;
    transform: translate(-50%, 20%) scale(0.2);
}

/* letter */
.letter {
    display: none;
    margin-top: 25px;
    max-width: 520px;
    padding: 20px;
    font-size: 18px;
    line-height: 1.7;
    color: #3a2f2a;
    animation: fadeIn 2s ease;
}

.names {
    margin-top: 15px;
    font-size: 24px;
    font-weight: bold;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

/* OPEN ANIMATION */
.open .flap {
    transform: rotateX(180deg);
}

.open .envelope {
    transform: scale(1.05);
}
</style>
</head>

<body>

<audio id="music" src="music.mp3"></audio>

<div class="container">
    <div class="envelope" id="envelope">
        <div class="flap"></div>
        <div class="seal" id="seal" onclick="openInvite()"></div>
    </div>

    <div class="letter" id="letter">
        <div>
            Together with our families,<br>
            we request the honor of your presence<br>
            as we begin our forever.
        </div>

        <div class="names">
            Pranamika & Shuvamoy
        </div>
    </div>
</div>

<script>

/* ---------- PETALS ---------- */
for(let i=0;i<25;i++){
    let p = document.createElement("div");
    p.className = "petal";
    p.style.left = Math.random()*100 + "vw";
    p.style.animationDuration = (5+Math.random()*5) + "s";
    document.body.appendChild(p);
}

/* ---------- OPEN SEQUENCE ---------- */
function openInvite() {

    let seal = document.getElementById("seal");
    let envelope = document.getElementById("envelope");
    let letter = document.getElementById("letter");
    let music = document.getElementById("music");

    // crack effect
    seal.classList.add("crack");

    setTimeout(() => {
        seal.classList.add("melt");
    }, 600);

    // open envelope
    setTimeout(() => {
        envelope.classList.add("open");
    }, 900);

    // show letter
    setTimeout(() => {
        letter.style.display = "block";
    }, 1400);

    // play music (user click enables autoplay)
    music.volume = 0.5;
    music.play().catch(()=>{});
}

</script>

</body>
</html>
