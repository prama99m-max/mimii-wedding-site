<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wedding Invitation</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f6f1ea;
        font-family: 'Georgia', serif;
    }

    .container {
        text-align: center;
    }

    /* Envelope */
    .envelope {
        width: 320px;
        height: 200px;
        background: #fff;
        position: relative;
        border: 2px solid #d8c3a5;
        border-radius: 6px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        overflow: hidden;
    }

    .flap {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 50%;
        background: #f0e6d6;
        clip-path: polygon(0 0, 100% 0, 50% 100%);
        transform-origin: top;
        transition: transform 1s ease;
        z-index: 2;
    }

    .seal {
        width: 55px;
        height: 55px;
        background: #b23a48;
        border-radius: 50%;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 3;
        cursor: pointer;
        box-shadow: 0 5px 10px rgba(0,0,0,0.2);
    }

    .seal::after {
        content: "✿";
        color: white;
        font-size: 24px;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
    }

    /* Letter */
    .letter {
        display: none;
        margin-top: 30px;
        padding: 20px;
        max-width: 500px;
        font-size: 18px;
        line-height: 1.6;
        color: #3a2f2a;
        animation: fadeIn 2s ease forwards;
    }

    .names {
        margin-top: 15px;
        font-weight: bold;
        font-size: 22px;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Open state */
    .open .flap {
        transform: rotateX(180deg);
    }

    .open .seal {
        opacity: 0;
        pointer-events: none;
    }
</style>
</head>

<body>

<div class="container">
    <div class="envelope" id="envelope">
        <div class="flap"></div>
        <div class="seal" onclick="openEnvelope()"></div>
    </div>

    <div class="letter" id="letter">
        <div>
            Together with our families,<br/>
            we request the honor of your presence<br/>
            as we begin our forever.
        </div>

        <div class="names">
            Pranamika & Shuvamoy
        </div>
    </div>
</div>

<script>
function openEnvelope() {
    document.getElementById("envelope").classList.add("open");
    
    setTimeout(() => {
        document.getElementById("letter").style.display = "block";
    }, 800);
}
</script>

</body>
</html>
