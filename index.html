<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Two hearts, one promise — join us as we say forever.</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(#fff7fb, #ffeef6);
    color: #333;
    text-align: center;
}

/* HERO */
.hero {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
    url('https://images.unsplash.com/photo-1529634894893-1c5f0f1d6c4a?auto=format&fit=crop&w=1200&q=80')
    center/cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
}

.hero h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 70px;
    margin: 0;
}

.hero p {
    font-size: 18px;
}

/* SECTIONS */
.section {
    padding: 60px 20px;
}

/* COUNTDOWN */
.timer {
    font-size: 32px;
    font-weight: bold;
    color: #c2185b;
}

/* DECOR LINE */
.divider {
    width: 120px;
    height: 2px;
    background: #c2185b;
    margin: 20px auto;
}

/* GALLERY */
.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
}

.gallery img {
    width: 260px;
    height: 260px;
    object-fit: cover;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

/* RSVP */
.rsvp {
    background: #fff0f5;
    padding: 50px 20px;
    margin-top: 40px;
}

input, textarea {
    width: 80%;
    max-width: 400px;
    padding: 12px;
    margin: 10px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 12px 25px;
    background: #c2185b;
    color: white;
    border: none;
    border-radius: 25px;
}

/* FADE */
.fade {
    animation: fadeIn 2s ease-in;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero fade">
    <h1>We're Getting Married</h1>
    <p>Save the Date 💍</p>
    <p><strong>26 December 2026</strong></p>
</div>

<!-- COUNTDOWN -->
<div class="section">
    <h2>Countdown</h2>
    <div class="divider"></div>
    <div class="timer" id="timer"></div>
</div>

<!-- STORY / DETAILS -->
<div class="section">
    <h2>Our Story</h2>
    <div class="divider"></div>
    <p>Together we begin a beautiful journey filled with love, laughter, and forever.</p>
</div>

<!-- GALLERY -->
<div class="section">
    <h2>Moments</h2>
    <div class="divider"></div>

    <div class="gallery">
        <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=800&q=80">
        <img src="https://images.unsplash.com/photo-1520854221256-17451cc331bf?auto=format&fit=crop&w=800&q=80">
        <img src="https://images.unsplash.com/photo-1523438097201-512ae7d59c3a?auto=format&fit=crop&w=800&q=80">
    </div>
</div>

<!-- RSVP -->
<div class="rsvp">
    <h2>RSVP</h2>
    <div class="divider"></div>

    <input type="text" placeholder="Your Name"><br>
    <input type="email" placeholder="Your Email"><br>
    <textarea placeholder="Your Message"></textarea><br>

    <button onclick="alert('RSVP received 💌')">
        Send RSVP
    </button>
</div>

<script>
// countdown
const weddingDate = new Date("Dec 26, 2026 00:00:00").getTime();

setInterval(() => {
    const now = new Date().getTime();
    const distance = weddingDate - now;

    const days = Math.floor(distance / (1000*60*60*24));
    const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
    const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
    const seconds = Math.floor((distance%(1000*60))/1000);

    document.getElementById("timer").innerHTML =
        days+"d "+hours+"h "+minutes+"m "+seconds+"s";

    if(distance < 0){
        document.getElementById("timer").innerHTML = "It's Wedding Day 💍";
    }
}, 1000);
</script>

</body>
</html>
